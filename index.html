<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Handlee&family=Lora:ital,wght@0,400..700;1,400..700&family=Patrick+Hand&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>Weather Practical</title>
  </head>
  <body>
    <div class="main-info">
      <header>
        <form class="search-form" id="search-form">
          <input
            type="search"
            placeholder="Enter a city...."
            required
            class="search-input"
            id="search-input"
          />
          <input type="submit" value="Search" class="search-button" />
        </form>
      </header>
      <main>
        <div class="weather-data">
          <div>
            <h1 class="weather-city" id="weather-city"></h1>
            <p class="weather-description">
              <span id="time">Friday 13:30</span>, <span id="cloud-desc"></span>
              <br />
              Humidity: <span class="desc-input" id="humidity"></span>, Wind:
              <span class="desc-input" id="wind-speed"></span>
            </p>
          </div>
          <div class="weather-temp">
            <span id="emoji"></span>
            <span class="weather-value" id="weather-temp"></span>
            <span class="weather-unit">°C</span>
          </div>
        </div>
        <div>
          <div class="weather-forecast">
            <div class="weather-forecast-day">
              <div class="weather-forecast-date">Sat</div>
              <div class="weather-forecast-emoji">🌤️</div>
              <div class="weather-forecast-temps">
                <div class="weather-forecast-temp">15°</div>
                <div class="weather-forecast-temp">7°</div>
              </div>
            </div>

            <div class="weather-forecast-day">
              <div class="weather-forecast-date">Sun</div>
              <div class="weather-forecast-emoji">🌤️</div>
              <div class="weather-forecast-temps">
                <div class="weather-forecast-temp">15°</div>
                <div class="weather-forecast-temp">7°</div>
              </div>
            </div>

            <div class="weather-forecast-day">
              <div class="weather-forecast-date">Mon</div>
              <div class="weather-forecast-emoji">🌤️</div>
              <div class="weather-forecast-temps">
                <div class="weather-forecast-temp">15°</div>
                <div class="weather-forecast-temp">7°</div>
              </div>
            </div>

            <div class="weather-forecast-day">
              <div class="weather-forecast-date">Tue</div>
              <div class="weather-forecast-emoji">🌤️</div>
              <div class="weather-forecast-temps">
                <div class="weather-forecast-temp">15°</div>
                <div class="weather-forecast-temp">7°</div>
              </div>
            </div>

            <div class="weather-forecast-day">
              <div class="weather-forecast-date">Wed</div>
              <div class="weather-forecast-emoji">🌤️</div>
              <div class="weather-forecast-temps">
                <div class="weather-forecast-temp">15°</div>
                <div class="weather-forecast-temp">7°</div>
              </div>
            </div>
          </div>
        </div>
      </main>
      <footer>
        This project was coded by
        <a href="https://github.com/dunmomee-blip" target="_blank"
          >Tijani Rafiat</a
        >
        is
        <a
          href="https://github.com/dunmomee-blip/Weather-App-Prac"
          target="_blank"
          >open-sourced on GitHub</a
        >
        and
        <a href="https://weatherpractical.netlify.app/" target="_blank"
          >hosted on Netlify</a
        >
      </footer>
    </div>
    <script src="src/app.js"></script>
  </body>
</html>
